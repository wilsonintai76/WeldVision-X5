version: '3.8'

services:
  # PostgreSQL Database (Production)
  db:
    image: postgres:15-alpine
    container_name: weldvision-db
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      - POSTGRES_DB=weldvision
      - POSTGRES_USER=weldvision_user
      - POSTGRES_PASSWORD=${DB_PASSWORD}
    restart: always
    networks:
      - weldvision-network

  # Django Backend
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.prod
    container_name: weldvision-backend
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app          # mount source for live reload
      - media_data:/app/media
      - static_data:/app/staticfiles
    environment:
      - DJANGO_SECRET_KEY=${DJANGO_SECRET_KEY}
      - DEBUG=False
      - DATABASE_URL=postgresql://weldvision_user:${DB_PASSWORD}@db:5432/weldvision
      - RDK_IP=${RDK_IP}
      - RDK_USERNAME=${RDK_USERNAME}
      - RDK_PASSWORD=${RDK_PASSWORD}
    depends_on:
      - db
    command: >
      sh -c "python manage.py migrate &&
             python manage.py collectstatic --noinput &&
             gunicorn weldvision.wsgi:application --bind 0.0.0.0:8000 --workers 2 --reload"
    restart: always
    networks:
      - weldvision-network

  # Vite watch-builder — rebuilds frontend on every source change
  frontend-builder:
    image: node:18-alpine
    container_name: weldvision-frontend-builder
    working_dir: /app
    volumes:
      - ./frontend:/app          # mount source
      - /app/node_modules        # keep node_modules inside container
      - dist_data:/app/dist      # share built output with nginx
    command: sh -c "npm install && npm run build:watch"
    restart: unless-stopped
    networks:
      - weldvision-network

  # Nginx — serves the pre-built dist written by frontend-builder
  frontend:
    image: nginx:alpine
    container_name: weldvision-frontend
    ports:
      - "80:80"
    volumes:
      - dist_data:/usr/share/nginx/html   # served from shared volume
      - ./frontend/nginx.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - backend
      - frontend-builder
    restart: always
    networks:
      - weldvision-network

volumes:
  postgres_data:
  media_data:
  static_data:
  dist_data:    # shared between frontend-builder and nginx

networks:
  weldvision-network:
    driver: bridge
