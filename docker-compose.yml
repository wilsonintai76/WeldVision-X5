services:
  # Database
  db:
    image: postgres:15-alpine
    container_name: weldvision-db
    environment:
      - POSTGRES_DB=weldvision
      - POSTGRES_USER=weldvision_user
      - POSTGRES_PASSWORD=weldvision_pass
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped
    networks:
      - weldvision-network

  # Django Backend
  backend:
    build:
      context: ./welding_server/backend
      dockerfile: Dockerfile
    container_name: weldvision-backend
    ports:
      - "8000:8000"
    volumes:
      - ./welding_server/backend:/app
      - media_data:/app/media
      - static_data:/app/staticfiles
    environment:
      - DJANGO_SECRET_KEY=dev-secret-key-change-in-production
      - DEBUG=True
      - DB_ENGINE=django.db.backends.postgresql
      - DB_NAME=weldvision
      - DB_USER=weldvision_user
      - DB_PASSWORD=weldvision_pass
      - DB_HOST=db
      - DB_PORT=5432
      # One-time Developer Setup: Horizon Open Explorer (OE) Toolchain
      # Set HORIZON_OE_IMAGE in your .env file
      - HORIZON_BIN_COMPILE_COMMAND=["docker","run","--rm","-v","{job_dir}:/workspace","-w","/workspace","${HORIZON_OE_IMAGE}","hb_mapper","makert","--model-type","onnx","--input","{onnx_container}","--output","{bin_container}"]
    command: >
      sh -c "while ! pg_isready -h db -p 5432 -U weldvision_user; do sleep 1; done &&
             python manage.py makemigrations &&
             python manage.py migrate &&
             python manage.py collectstatic --noinput &&
             python manage.py runserver 0.0.0.0:8000"
    restart: unless-stopped
    depends_on:
      - db
    networks:
      - weldvision-network

  # React Frontend
  frontend:
    build:
      context: ./welding_server/frontend
      dockerfile: Dockerfile
    container_name: weldvision-frontend
    ports:
      - "3000:3000"
    volumes:
      - ./welding_server/frontend:/app
      - /app/node_modules
    environment:
      - VITE_API_URL=http://localhost:8000
    depends_on:
      - backend
    restart: unless-stopped
    networks:
      - weldvision-network

  # Edge Device Simulator (Mock RDK X5)
  mock-rdk:
    build:
      context: ./edge_device
      dockerfile: Dockerfile
    container_name: weldvision-mock-rdk
    ports:
      - "8554:8554"
    environment:
      - WELDVISION_SIMULATION=1
      - WELDVISION_SERVER_URL=http://backend:8000
      - WELDVISION_STREAM_HOST=0.0.0.0
      - WELDVISION_STREAM_PORT=8554
      - STUDENT_ID=DEMO_STUDENT
    depends_on:
      - backend
    restart: unless-stopped
    networks:
      - weldvision-network

volumes:
  media_data:
  static_data:
  postgres_data:

networks:
  weldvision-network:
    driver: bridge
