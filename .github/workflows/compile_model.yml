name: Compile YOLOv8 → Horizon BPU (.bin)

# ─────────────────────────────────────────────────────────────────────────────
# TRIGGER
# Triggered from the WeldVision MLOps frontend via the Worker's
# POST /api/models/github-compile endpoint, which calls the GitHub
# workflow_dispatch API with the R2 key of the uploaded .pt file.
# Can also be run manually from the GitHub Actions UI.
# ─────────────────────────────────────────────────────────────────────────────
on:
  workflow_dispatch:
    inputs:
      model_r2_key:
        description: 'R2 object key of the .pt file to compile (e.g. models/uploads/…_best.pt)'
        required: true
        default: ''

jobs:
  build_and_deploy:
    name: Download → ONNX → BPU .bin → R2
    runs-on: ubuntu-latest

    env:
      MODEL_R2_KEY: ${{ inputs.model_r2_key }}

    steps:
      # ── 1. Checkout repo ────────────────────────────────────────────────
      # We need horizon_config.yaml and calibration_data/ from the repo.
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Python + Ultralytics ─────────────────────────────────────────
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Ultralytics (ONNX export)
        run: pip install --quiet ultralytics onnx onnxsim

      # ── 3. Download trained model from Cloudflare R2 ────────────────────
      - name: Download model from Cloudflare R2
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_KEY }}
        run: |
          echo "Downloading $MODEL_R2_KEY from R2 ..."
          aws s3 cp "s3://weldvision-media/$MODEL_R2_KEY" best.pt \
            --endpoint-url "https://${{ secrets.CLOUDFLARE_ACCOUNT_ID }}.r2.cloudflarestorage.com" \
            --region auto
          ls -lh best.pt

      # ── 4. Export PyTorch → ONNX ─────────────────────────────────────────
      # opset=11 is required by Horizon's hb_mapper.
      # simplify=True folds constants and removes dead nodes before BPU compile.
      - name: Export to ONNX (opset 11, simplified)
        run: |
          yolo export model=best.pt format=onnx opset=11 simplify=True imgsz=640
          mv best.onnx yolov8_weld.onnx
          ls -lh yolov8_weld.onnx

      # ── 5. Compile ONNX → Horizon BPU .bin ──────────────────────────────
      # openexplorer/horizon_oe_toolchain is Horizon's official Docker image.
      # It contains hb_mapper, which quantises the 32-bit float weights to
      # Int8 using the 50 weld calibration images in calibration_data/.
      # The output is written to model_output/yolov8_weld.bin.
      - name: Pull Horizon Open Explorer toolchain image
        run: docker pull openexplorer/horizon_oe_toolchain:latest

      - name: Compile to Horizon .bin (Int8 quantisation for BPU)
        run: |
          docker run --rm \
            -v "${{ github.workspace }}:/workspace" \
            openexplorer/horizon_oe_toolchain:latest \
            hb_mapper makertbin \
              --config /workspace/horizon_config.yaml \
              --model-type onnx
          ls -lh "${{ github.workspace }}/model_output/"

      # ── 6. Rename output for the RDK X5 ModelWatchdog ───────────────────
      # ModelWatchdog.download_from_r2() saves the file as model_update.bin.
      # Storing it under that name in R2 keeps the edge-device code simple.
      - name: Prepare model_update.bin
        run: |
          cp model_output/yolov8_weld.bin model_update.bin
          echo "BPU model size: $(du -sh model_update.bin | cut -f1)"

      # ── 7. Upload model_update.bin → Cloudflare R2 ──────────────────────
      # The RDK X5 polls models/model_update.bin in the weldvision-media
      # bucket on every boot via ModelWatchdog.download_from_r2().
      - name: Upload to Cloudflare R2 (weldvision-media/models/)
        uses: ryand56/r2-upload-action@latest
        with:
          r2-account-id:        ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          r2-access-key-id:     ${{ secrets.R2_ACCESS_KEY_ID }}
          r2-secret-access-key: ${{ secrets.R2_SECRET_KEY }}
          r2-bucket:            weldvision-media
          source-dir:           model_update.bin
          destination-dir:      models/

      # ── 8. Tag the release in Git ────────────────────────────────────────
      - name: Tag release
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          TAG="model-$(date +'%Y%m%d%H%M%S')"
          git tag "$TAG"
          git push origin "$TAG"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # ── 9. Summary ───────────────────────────────────────────────────────
      - name: Print pipeline summary
        run: |
          echo "## MLOps Pipeline Complete" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Stage | Result |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|" >> $GITHUB_STEP_SUMMARY
          echo "| Source model | \`$MODEL_R2_KEY\` |" >> $GITHUB_STEP_SUMMARY
          echo "| ONNX export | ✅ yolov8_weld.onnx |" >> $GITHUB_STEP_SUMMARY
          echo "| BPU compilation | ✅ yolov8_weld.bin (Int8, Bayes-e) |" >> $GITHUB_STEP_SUMMARY
          echo "| R2 upload path | \`weldvision-media/models/model_update.bin\` |" >> $GITHUB_STEP_SUMMARY
          echo "| RDK X5 pickup | Next boot → ModelWatchdog hot-swap |" >> $GITHUB_STEP_SUMMARY

# ─────────────────────────────────────────────────────────────────────────────
# REQUIRED GITHUB SECRETS (Settings → Secrets → Actions):
#   CLOUDFLARE_ACCOUNT_ID — b6f9b4c33511b3e607595a0993dfdcd4
#   R2_ACCESS_KEY_ID      — R2 API token Access Key ID
#   R2_SECRET_KEY         — R2 API token Secret Access Key
# ─────────────────────────────────────────────────────────────────────────────
